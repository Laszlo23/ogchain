# Build from repository root: docker compose build
# Run: docker compose up -d
services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: https://buildingculture.capital
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SITE_URL=https://buildingculture.capital
